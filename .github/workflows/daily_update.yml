name: Daily Football Update

on:
  schedule:
    - cron: "0 15-23,0 * * *"
  workflow_dispatch:
  push:
    branches:
      - '**'       # all branches

permissions:
  contents: write
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      # ── PIPELINE 1: football-data.org ──────────────────────
      - name: Fetch daily match results
        run: python ingestion/fetch_daily.py
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}

      - name: Transform → Supabase matches
        run: python transformation/clean.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Compute basic team stats → Supabase team_stats
        run: python analysis/team_stats.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # ── PIPELINE 2: SofaScore ──────────────────────────────
      - name: Fetch new SofaScore match stats
        run: python ingestion/fetch_sofascore_daily.py

      - name: Transform → Supabase sofascore_matches
        run: python transformation/clean_sofascore.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Compute advanced team stats → Supabase team_stats_advanced
        run: python analysis/team_stats_sofascore.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # ── COMMIT raw JSON only (no config.js) ────────────────
      - name: Commit and push raw data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/raw/ data/raw_sofascore/ seasons_map.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "auto: daily update $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "No changes to commit"
          fi

      # ── BUILD SITE (inject config.js into a deploy folder) ─
      - name: Build site for deployment
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          # Write config.js directly into the deploy folder — never touches the repo
          cat > _site/config.js << EOF
          window.SUPABASE_URL = "${{ secrets.SUPABASE_URL }}";
          window.SUPABASE_ANON_KEY = "${{ secrets.SUPABASE_ANON_KEY }}";
          EOF

      # ── DEPLOY to GitHub Pages ──────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4