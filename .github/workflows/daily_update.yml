name: Daily Football Update

on:
  schedule:
    - cron: "0 15-23,0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      # ── PIPELINE 1: football-data.org (scores + results) ──
      - name: Fetch daily match results
        run: python ingestion/fetch_daily.py
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}

      - name: Transform football-data results
        run: python transformation/clean.py

      - name: Compute basic team stats
        run: python analysis/team_stats.py

      # ── PIPELINE 2: SofaScore (deep stats) ──
      - name: Fetch new SofaScore match stats
        run: python ingestion/fetch_sofascore_daily.py

      - name: Transform SofaScore data
        run: python transformation/clean_sofascore.py

      - name: Compute advanced team stats
        run: python analysis/team_stats_sofascore.py

      # ── COMMIT ──
      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/ seasons_map.json
          git diff --cached --quiet || git commit -m "auto: daily update $(date +'%Y-%m-%d %H:%M')"
          git push