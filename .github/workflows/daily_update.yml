name: Daily Football Update

on:
  schedule:
    - cron: "0 15-23,0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Fetches all history for all branches and tags

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      # ── PIPELINE 1: football-data.org ──────────────────────
      - name: Fetch daily match results
        run: python ingestion/fetch_daily.py
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}

      - name: Transform → Supabase matches
        run: python transformation/clean.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Compute basic team stats → Supabase team_stats
        run: python analysis/team_stats.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # ── PIPELINE 2: SofaScore ──────────────────────────────
      - name: Fetch new SofaScore match stats
        run: python ingestion/fetch_sofascore_daily.py

      - name: Transform → Supabase sofascore_matches
        run: python transformation/clean_sofascore.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Compute advanced team stats → Supabase team_stats_advanced
        run: python analysis/team_stats_sofascore.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # ── GENERATE config.js from secrets ──────────────────────
      - name: Generate config.js
        run: |
          cat > config.js << 'ENDOFFILE'
          window.SUPABASE_URL = "${{ secrets.SUPABASE_URL }}";
          window.SUPABASE_ANON_KEY = "${{ secrets.SUPABASE_ANON_KEY }}";
          ENDOFFILE

      # ── COMMIT AND PUSH ──────────────────────────────────────
      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          # Ensure config.js is added even if it was previously ignored
          git add -f config.js 
          git add data/raw/ data/raw_sofascore/ seasons_map.json
          
          # Only commit if there are actual changes
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "auto: daily update and config generation $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "No changes to commit"
          fi